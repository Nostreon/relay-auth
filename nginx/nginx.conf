events {
    worker_connections 4096;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=ws_conn:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=ws_concurrent:10m;

    upstream relay_gated {
        server strfry-gated:7777;
    }

    upstream relay_auth_api {
        server relay-auth:3003;
    }

    # Gated relay — WebSocket
    server {
        listen 81;

        location / {
            proxy_pass http://relay_gated;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            limit_req zone=ws_conn burst=20 nodelay;
            limit_conn ws_concurrent 10;
        }
    }

    # Relay auth API — internal only
    server {
        listen 82;

        location / {
            proxy_pass http://relay_auth_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
