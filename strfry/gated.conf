# strfry configuration for a gated relay
# NIP-42 auth required for read and write

db = "./strfry-db/"

relay {
    info {
        name = "Gated Relay"
        description = "Subscription-gated relay — NIP-42 auth required"
        contact = "admin@example.com"
    }

    bind = "0.0.0.0"
    port = 7777

    nofiles = 65536

    maxWebsocketPayloadSize = 131072
    autoPingSeconds = 55

    # Require NIP-42 authentication
    # The relay-auth service handles subscription verification
    writePolicy {
        plugin = ""
    }

    compression {
        enabled = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
    }
}
